worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        client_max_body_size 25m;

        # Proxy to NetBox (gunicorn on port 8080)
        location / {
            proxy_pass http://netbox:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Media files served directly by nginx
        location /media/ {
            alias /opt/netbox/netbox/media/;
        }

        # ── HTTPS redirect (uncomment when SSL is configured) ──────────────
        # return 301 https://$host$request_uri;
    }

    # ── HTTPS server (uncomment and configure when SSL is ready) ──────────────
